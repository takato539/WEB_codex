<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WEB_codex</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/main.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a class="site-logo" href="./">WEB_codex</a>
    <nav class="site-nav" aria-label="メインナビゲーション">
      <a href="#about">About</a>
      <a href="#features">Features</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main class="site-main">
    <section class="hero" id="about">
      <div class="hero-content">
        <h1>WEB_codex</h1>
        <p>GitHub Pagesで公開するシンプルなWebサイトです。</p>
        <button class="button" type="button" data-message-button>メッセージを表示</button>
        <p class="message" data-message aria-live="polite"></p>
      </div>
    </section>

    <section class="section" id="features">
      <h2>Features</h2>
      <div class="feature-grid">
        <article class="feature">
          <h3>HTML</h3>
          <p>ページの構造を追加できます。</p>
        </article>
        <article class="feature">
          <h3>CSS</h3>
          <p>レイアウトや見た目を調整できます。</p>
        </article>
        <article class="feature">
          <h3>JavaScript</h3>
          <p>クリック操作などの機能を追加できます。</p>
        </article>
      </div>
    </section>

    <section class="section" id="contact">
      <h2>Contact</h2>
      <p>ここにプロフィールや連絡先を追加できます。</p>
    </section>
  </main>

  <footer class="site-footer">
    <small>&copy; 2026 WEB_codex</small>
  </footer>
</body>
</html>
