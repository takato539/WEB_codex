<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WEB_codex</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: #1f2937;
      background: #f8fafc;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 720px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      color: #4b5563;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color: #f9fafb;
        background: #111827;
      }

      p {
        color: #d1d5db;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>WEB_codex</h1>
    <p>GitHub Pagesで公開するシンプルなWebサイトです。</p>
  </main>
</body>
</html>
